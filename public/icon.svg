<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Rounded-square background, cream. -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="#f7f3ef"/>

  <!-- Hand mirror: oval head + handle. -->
  <g transform="translate(256 248)">
    <!-- soft shadow -->
    <ellipse cx="0" cy="-36" rx="150" ry="170" fill="#efe0d4"/>
    <!-- rim -->
    <ellipse cx="0" cy="-40" rx="138" ry="158" fill="#ffffff" stroke="#c88a8f" stroke-width="12"/>
    <!-- inner glass highlight -->
    <ellipse cx="-32" cy="-80" rx="64" ry="40" fill="#ffffff" opacity="0.9"/>
    <!-- handle -->
    <rect x="-24" y="118" width="48" height="110" rx="20" ry="20" fill="#c88a8f"/>
    <rect x="-14" y="126" width="28" height="94" rx="12" ry="12" fill="#a66c72"/>
  </g>

  <!-- Serif "M" monogram as a path so we don't need a bundled font. -->
  <g transform="translate(256 232)" fill="#2a1f1c">
    <path d="
      M -74 -60
      L -42 -60
      L -6 40
      L 30 -60
      L 62 -60
      L 62 60
      L 38 60
      L 38 -16
      L 10 56
      Q 4 64 -6 64
      Q -16 64 -22 56
      L -50 -16
      L -50 60
      L -74 60
      Z"/>
  </g>
</svg>
